spring.application.name=${APP_NAME:user-order-service}
server.port=${PORT:8081}
#DB
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
cors.allowed-origins=http://localhost:3000
#CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5000,http://localhost:8081}
#SERVER
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=${SHUTDOWN_TIMEOUT:30s}
#LOGS
logging.level.root=${LOG_LEVEL_ROOT:INFO}
#EXTERNAL URL
fakestore-base-url=${PRODUCT_SERVICE_BASE_URL:http://fakestoreservice-env.eba-qva25xqa.eu-north-1.elasticbeanstalk.com/products}
# Product Service
product-service.base-url=${PRODUCT_SERVICE_URL:http://localhost:5000}