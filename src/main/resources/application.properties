spring.application.name=${APP_NAME:user-order-service}
server.port=${PORT:8081}
# Gemensamma JPA-installningar
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
# Product service
product-service.base-url=${PRODUCT_SERVICE_URL:http://localhost:5000}
# Server
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=${SHUTDOWN_TIMEOUT:30s}
# Logs
logging.level.root=${LOG_LEVEL_ROOT:INFO}
# Aktiv profil (override med SPRING_PROFILES_ACTIVE)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}