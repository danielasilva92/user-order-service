# Testkonfiguration - H2 in-memory databas
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
# JWT - dummy
jwt.secret=test-secret-key-1234567890-abcdefghijklmnopqrstuvwxyz
jwt.expiration=86400000
# Product service (anropas inte i contextLoads, men ska finnas)
product-service.base-url=http://localhost:5000