services:

  # ── MySQL databas ─────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: cloudstore-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: cloudstore_users
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - cloudstore-network

  # ── User/Order Service ────────────────────────────
  user-order-service:
    build:
      context: ./user-order-service
      dockerfile: Dockerfile
    container_name: user-order-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cloudstore-network

  # ── Product Service ───────────────────────────────
  product-service:
    build:
      context: ./fakeStoreAPI
      dockerfile: Dockerfile
    container_name: product-service
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JWT_SECRET: ${JWT_SECRET}
      FAKESTORE_URL: https://fakestoreapi.com
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cloudstore-network

  # ── React Frontend ────────────────────────────────
  frontend:
    build:
      context: ./cloudstore-frontend
      dockerfile: Dockerfile.frontend
    container_name: cloudstore-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      REACT_APP_USER_URL: http://localhost:8081
      REACT_APP_PRODUCT_URL: http://localhost:5000
    depends_on:
      - user-order-service
      - product-service
    networks:
      - cloudstore-network

volumes:
  mysql-data:

networks:
  cloudstore-network:
    driver: bridge