name: CI/CD - user-order-service

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn -B clean package --file pom.xml

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/user-order-service:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/user-order-service:latest
            docker stop user-order-service || true
            docker rm user-order-service || true
            docker run -d --name user-order-service --restart always -p 8081:8081 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_URL="jdbc:mysql://cloudstore-db.cnegcciaanlr.eu-north-1.rds.amazonaws.com:3306/cloudstore_users?createDatabaseIfNotExist=true" \
              -e DB_USERNAME="admin" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e JWT_EXPIRATION="86400000" \
              -e CORS_ALLOWED_ORIGINS="http://localhost:3000,https://cloudstore-frontend.onrender.com" \
              -e PRODUCT_SERVICE_URL="http://fakestoreservice-env.eba-bemm72kr.eu-north-1.elasticbeanstalk.com" \
              ${{ secrets.DOCKERHUB_USERNAME }}/user-order-service:latest